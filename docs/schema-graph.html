<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IfcX Schema - Complete Interactive Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0c14;color:#ccc;font-family:system-ui,sans-serif;overflow:hidden;display:flex}
canvas{display:block;cursor:grab;flex:1}canvas.dragging{cursor:grabbing}
#panel{width:0;min-width:0;background:#0e1018;border-left:1px solid #2a2d3a;overflow-y:auto;overflow-x:hidden;transition:width .25s,min-width .25s;z-index:30;flex-shrink:0}
#panel.open{width:420px;min-width:420px}
#panel-inner{padding:16px;opacity:0;transition:opacity .15s}
#panel.open #panel-inner{opacity:1}
#panel-close{position:absolute;top:8px;right:8px;background:none;border:1px solid #333;color:#888;width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
#panel-close:hover{background:#1a1d28;color:#fff}
#panel-header{position:relative;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #1e2130}
#panel-header h2{font-size:18px;margin-bottom:2px}
#panel-header .sub{font-size:11px;color:#666;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;margin-top:6px;letter-spacing:.5px}
.sec{margin-bottom:14px}
.sec h3{font-size:12px;color:#4da6ff;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.sec h3::before{content:'';display:inline-block;width:3px;height:14px;border-radius:2px;background:#4da6ff}
.ptable{width:100%;border-collapse:collapse;font-size:11px}
.ptable th{text-align:left;color:#666;font-weight:500;padding:4px 6px;border-bottom:1px solid #1a1d28;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.ptable td{padding:5px 6px;border-bottom:1px solid #13151f;vertical-align:top}
.ptable tr:hover td{background:#13151f}
.pname{color:#7ec;font-family:monospace;font-size:11px}
.ptype{color:#b197fc;font-size:10px;font-family:monospace}
.pdesc{color:#777;font-size:10px}
.pval{color:#ffa94d;font-size:10px;font-family:monospace}
.rel-list{list-style:none;padding:0}
.rel-list li{padding:5px 8px;border-radius:4px;margin-bottom:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.rel-list li:hover{background:#1a1d28}
.rel-list li .dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.rel-list li .rtype{color:#666;font-size:9px;margin-left:auto}
#breadcrumb{display:flex;gap:4px;font-size:10px;margin-bottom:10px;flex-wrap:wrap}
#breadcrumb span{color:#4da6ff;cursor:pointer;padding:2px 6px;background:#111422;border-radius:3px}
#breadcrumb span:hover{background:#1a2a44}
#breadcrumb span.current{color:#fff;cursor:default;background:#1a3a5c}
#info{position:fixed;top:10px;left:10px;background:rgba(15,17,25,0.94);border:1px solid #2a2d3a;border-radius:8px;padding:12px;max-width:260px;font-size:11px;z-index:10;pointer-events:none}
#info h2{color:#4da6ff;font-size:14px;margin-bottom:4px}
#info p{color:#777;font-size:10px;line-height:1.5;margin-bottom:3px}
#info .k{color:#4da6ff;font-size:9px}
#legend{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:85vw}
.lg{display:flex;align-items:center;gap:3px;font-size:9px;color:#666}.lg .d{width:8px;height:8px;border-radius:2px}
#controls{position:fixed;top:10px;right:10px;z-index:10;display:flex;flex-direction:column;gap:3px;transition:right .25s;max-height:calc(100vh - 20px);overflow-y:auto}
#controls.shifted{right:430px}
#controls button{background:#1a1d28;border:1px solid #2a2d3a;color:#999;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;white-space:nowrap;text-align:left}
#controls button:hover{background:#2a2d3a;color:#fff}
#controls button.on{background:#1a3a5c;border-color:#4da6ff;color:#4da6ff}
.sep{height:1px;background:#2a2d3a;margin:2px 0}
#stats{position:fixed;bottom:40px;right:10px;font-size:9px;color:#555;z-index:10;pointer-events:none}
#panel::-webkit-scrollbar{width:6px}
#panel::-webkit-scrollbar-track{background:#0e1018}
#panel::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:3px}
#search{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:15;display:flex;flex-direction:column;align-items:center}
#search-box{background:rgba(15,17,25,0.94);border:1px solid #2a2d3a;border-radius:8px;color:#ddd;padding:8px 14px 8px 32px;font-size:13px;width:320px;outline:none;font-family:system-ui;backdrop-filter:blur(8px)}
#search-box:focus{border-color:#4da6ff;box-shadow:0 0 12px #4da6ff22}
#search-box::placeholder{color:#445}
#search-icon{position:absolute;left:12px;top:10px;color:#445;font-size:14px;pointer-events:none}
#search-results{background:rgba(12,14,22,0.96);border:1px solid #2a2d3a;border-top:none;border-radius:0 0 8px 8px;max-height:320px;overflow-y:auto;width:320px;display:none;backdrop-filter:blur(8px)}
#search-results.open{display:block}
.sr{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;transition:background .1s;border-bottom:1px solid #0e1018}
.sr:hover,.sr.active{background:#141828}
.sr .sr-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.sr .sr-label{flex:1;color:#ccc}
.sr .sr-cat{font-size:9px;color:#556;margin-left:auto}
.sr .sr-origin{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700}
#search-results::-webkit-scrollbar{width:5px}
#search-results::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:3px}
</style>
</head>

function updateStats(){

  const i5=vn.filter(n=>n.o==='ifc5').length, ix=vn.filter(n=>n.o==='ifcx').length;
  ST.textContent=`${vn.length} nodes (IFC5: ${i5} | IfcX: ${ix}) | ${ve} edges`;

function getConnected(id){
  const ch=[],pa=[],inh=[],inhBy=[],co=[];
  for(const e of E){
    if(e.f===id){const n=NM[e.t];if(!n)continue;if(e.k==='c')ch.push({n:n,lb:e.lb||''});else if(e.k==='i')inh.push({n:n,lb:e.lb||'type'});else co.push({n:n,lb:e.lb||''});}
    if(e.t===id){const n=NM[e.f];if(!n)continue;if(e.k==='c')pa.push({n:n,lb:e.lb||''});else if(e.k==='i')inhBy.push({n:n,lb:e.lb||'instance'});else co.push({n:n,lb:e.lb||''});}
  }
  return{ch,pa,inh,inhBy,co};
}
function isConn(a,b){for(const e of E)if((e.f===a&&e.t===b)||(e.t===a&&e.f===b))return true;return false}

// === SEARCH ===
const SBOX=document.getElementById('search-box'),SRES=document.getElementById('search-results');
let sIdx=-1;

SBOX.addEventListener('input',()=>{
  const q=SBOX.value.trim().toLowerCase();
  if(!q){SRES.classList.remove('open');SRES.innerHTML='';sIdx=-1;return}
  const matches=N.filter(n=>{
    return n.l.toLowerCase().includes(q)||n.id.toLowerCase().includes(q)||
      (n.cat&&n.cat.toLowerCase().includes(q))||
      n.g.toLowerCase().includes(q)||
      n.a.some(a=>a.toLowerCase().includes(q));
  }).slice(0,15);
  if(!matches.length){SRES.classList.remove('open');SRES.innerHTML='';sIdx=-1;return}
  SRES.classList.add('open');sIdx=-1;
  SRES.innerHTML=matches.map((n,i)=>{
    const oCol=n.o==='ifcx'?'#69db7c':'#4da6ff';
    const oLbl=n.o==='ifcx'?'IfcX':'IFC5';
    return `<div class="sr" data-id="${n.id}"><div class="sr-dot" style="background:${n.c}"></div><span class="sr-label">${esc(n.l)}</span><span class="sr-cat">${esc(n.cat||'')}</span><span class="sr-origin" style="background:${oCol}18;color:${oCol}">${oLbl}</span></div>`;
  }).join('');
  SRES.querySelectorAll('.sr').forEach(el=>el.addEventListener('click',()=>selectSearchResult(el.dataset.id)));
});

SBOX.addEventListener('keydown',e=>{
  const items=SRES.querySelectorAll('.sr');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();sIdx=Math.min(sIdx+1,items.length-1);updateSrActive(items)}
  else if(e.key==='ArrowUp'){e.preventDefault();sIdx=Math.max(sIdx-1,0);updateSrActive(items)}
  else if(e.key==='Enter'&&sIdx>=0){e.preventDefault();selectSearchResult(items[sIdx].dataset.id)}
  else if(e.key==='Escape'){SBOX.blur();SRES.classList.remove('open');sIdx=-1}
});

SBOX.addEventListener('focus',()=>{if(SBOX.value.trim())SBOX.dispatchEvent(new Event('input'))});
document.addEventListener('click',e=>{if(!e.target.closest('#search')){SRES.classList.remove('open');sIdx=-1}});

function updateSrActive(items){items.forEach((el,i)=>el.classList.toggle('active',i===sIdx))}

function selectSearchResult(id){
  const node=NM[id];if(!node)return;
  SRES.classList.remove('open');SBOX.value='';sIdx=-1;
  // Navigate camera to node
  cam.x=node.x;cam.y=node.y;
  if(cam.z<0.4)cam.z=0.7;
  openPanel(node);
}

// === PANEL ===
function openPanel(node){
  selected=node;history.push(node.id);
  PNL.classList.add('open');CTRLS.classList.add('shifted');
  setTimeout(resize,260);renderPanel(node);
}
function closePanel(){
  selected=null;history.length=0;PNL.classList.remove('open');CTRLS.classList.remove('shifted');
  setTimeout(resize,260);
}
PCLOSE.addEventListener('click',closePanel);

function renderPanel(node){
  PTITLE.textContent=node.l;
  PSUB.textContent=node.cat||node.g;
  const originCol=node.o==='ifcx'?'#69db7c':'#4da6ff';
  const originLabel=node.o==='ifcx'?'IfcX (wij voegen toe)':'IFC5 (bestaande standaard)';
  const bsiUrl=BSI_LINKS[node.id];
  PBADGE.innerHTML=`<span class="badge" style="background:${node.c}22;color:${node.c};border:1px solid ${node.c}44">${node.g.toUpperCase()}</span> <span class="badge" style="background:${originCol}18;color:${originCol};border:1px solid ${originCol}44">${originLabel}</span>`
    +(bsiUrl?`<br><a href="${bsiUrl}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;font-size:11px;color:#4da6ff;text-decoration:none;padding:3px 10px;border:1px solid #4da6ff33;border-radius:4px;background:#4da6ff0a">&#x2197; buildingSMART docs</a>`:'')
  BREAD.innerHTML='';
  [...new Set(history)].forEach((hid,i,arr)=>{
    const hn=NM[hid];if(!hn)return;const sp=document.createElement('span');sp.textContent=hn.l;
    if(i===arr.length-1)sp.classList.add('current');else sp.addEventListener('click',()=>navTo(hid));
    BREAD.appendChild(sp);
  });
  let h='';
  if(node.a&&node.a.length){
    h+='<div class="sec"><h3>Attributen</h3><table class="ptable"><tbody>';
    for(const a of node.a){const p=a.split(': ');
      if(p.length>=2)h+=`<tr><td class="pname">${esc(p[0])}</td><td class="pval">${esc(p.slice(1).join(': '))}</td></tr>`;
      else h+=`<tr><td class="pname" colspan="2">${esc(a)}</td></tr>`;
    }h+='</tbody></table></div>';
  }
  const ps=NODE_PSETS[node.id];
  if(ps){for(const pn of ps){const p=PSETS[pn];if(!p)continue;
    h+=`<div class="sec"><h3>${esc(pn)}</h3><p style="font-size:10px;color:#666;margin-bottom:6px">${esc(p.d)}</p>`;
    h+='<table class="ptable"><thead><tr><th>Property</th><th>Type</th><th>Omschrijving</th></tr></thead><tbody>';
    for(const pr of p.p)h+=`<tr><td class="pname">${esc(pr.n)}</td><td class="ptype">${esc(pr.t)}</td><td class="pdesc">${esc(pr.d)}</td></tr>`;
    h+='</tbody></table></div>';
  }}
  // Category properties
  const cp=CAT_PROPS[node.cat];
  if(cp){
    h+=`<div class="sec"><h3>${esc(cp.title)}</h3><table class="ptable"><thead><tr><th>Namespace / Attribuut</th><th>Beschrijving</th></tr></thead><tbody>`;
    for(const it of cp.items)h+=`<tr><td class="pname">${esc(it.n)}</td><td class="pdesc">${esc(it.d)}</td></tr>`;
    h+='</tbody></table></div>';
  }

  const cn=getConnected(node.id);
  if(cn.pa.length)h+=relSec('Parent',cn.pa,'#4da6ff','parent');
  if(cn.ch.length)h+=relSec('Children',cn.ch,null,'child');
  if(cn.inh.length)h+=relSec('Type',cn.inh,'#51cf66','type');
  if(cn.inhBy.length)h+=relSec('Instances',cn.inhBy,null,'instance');
  if(cn.co.length)h+=relSec('Connects',cn.co,'#ffa94d',null);
  PBODY.innerHTML=h;
  PBODY.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>navTo(el.dataset.nav)));
}
function relSec(title,items,defCol,defType){
  let h=`<div class="sec"><h3>${title} (${items.length})</h3><ul class="rel-list">`;
  for(const r of items)h+=`<li data-nav="${r.n.id}"><div class="dot" style="background:${defCol||r.n.c}"></div>${esc(r.n.l)}<span class="rtype">${r.lb||defType||''}</span></li>`;
  return h+'</ul></div>';
}
function navTo(id){const n=NM[id];if(!n)return;selected=n;history.push(id);renderPanel(n);cam.x+=(n.x-cam.x)*0.3;cam.y+=(n.y-cam.y)*0.3}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// === CONTROLS ===
document.querySelectorAll('#controls button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#controls button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');filter=b.id.replace('b-','');updateStats();
}));
updateStats();

// === CANVAS INTERACTION ===
let dragStart=null,didDrag=false;
CV.addEventListener('mousedown',e=>{
  const[mx,my]=s2w(e.clientX,e.clientY);
  if(e.button>0){pan=true;lx=e.clientX;ly=e.clientY;CV.classList.add('dragging');return}
  dragStart={x:e.clientX,y:e.clientY};didDrag=false;
  for(let i=N.length-1;i>=0;i--){const n=N[i];if(!vis(n))continue;
    if(mx>n.x-n.w/2-3&&mx<n.x+n.w/2+3&&my>n.y-n.h/2-3&&my<n.y+n.h/2+3){drag=n;CV.classList.add('dragging');return}}
  pan=true;lx=e.clientX;ly=e.clientY;CV.classList.add('dragging');
});
CV.addEventListener('contextmenu',e=>e.preventDefault());
CV.addEventListener('mousemove',e=>{
  if(pan){cam.x-=(e.clientX-lx)/cam.z;cam.y-=(e.clientY-ly)/cam.z;lx=e.clientX;ly=e.clientY}
  else if(drag){const[mx,my]=s2w(e.clientX,e.clientY);drag.x=mx;drag.y=my;didDrag=true}
  else{const[mx,my]=s2w(e.clientX,e.clientY);let f=null;
    for(let i=N.length-1;i>=0;i--){const n=N[i];if(!vis(n))continue;
      if(mx>n.x-n.w/2-3&&mx<n.x+n.w/2+3&&my>n.y-n.h/2-3&&my<n.y+n.h/2+3){f=n;break}}
    hovered=f;CV.style.cursor=f?'pointer':'grab'}
  if(dragStart){const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;if(Math.abs(dx)+Math.abs(dy)>5)didDrag=true}
});
CV.addEventListener('mouseup',()=>{if(drag&&!didDrag)openPanel(drag);drag=null;pan=false;CV.classList.remove('dragging');dragStart=null});
CV.addEventListener('mouseleave',()=>{drag=null;pan=false;hovered=null;CV.classList.remove('dragging');dragStart=null});
CV.addEventListener('wheel',e=>{
  e.preventDefault();
  const[wx,wy]=s2w(e.clientX,e.clientY);
  const f=e.deltaY>0?0.92:1.08;
  const nz=Math.max(0.12,Math.min(5,cam.z*f));
  // Zoom towards mouse pointer
  cam.x=wx-(wx-cam.x)*(cam.z/nz);
  cam.y=wy-(wy-cam.y)*(cam.z/nz);
  cam.z=nz;
},{passive:false});

// === DRAW ===
function rr(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);X.closePath()}
let t=0;
function draw(){
  t+=0.008;X.save();X.setTransform(DPR,0,0,DPR,0,0);X.clearRect(0,0,W,H);X.translate(W/2,H/2);X.scale(cam.z,cam.z);X.translate(-cam.x,-cam.y);
  // Edges
  for(const e of E){const a=NM[e.f],b=NM[e.t];if(!a||!b||!vis(a)||!vis(b))continue;
    const isSel=selected&&(e.f===selected.id||e.t===selected.id);
    X.beginPath();X.moveTo(a.x,a.y);
    if(e.k==='o'){const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y;X.quadraticCurveTo(mx-dy*0.1,my+dx*0.1,b.x,b.y)}
    else X.lineTo(b.x,b.y);
    if(e.k==='c'){X.strokeStyle=isSel?'rgba(77,166,255,0.5)':'rgba(77,166,255,0.15)';X.lineWidth=isSel?2:1;X.setLineDash([])}
    else if(e.k==='i'){X.strokeStyle=isSel?'rgba(81,207,102,0.6)':'rgba(81,207,102,0.3)';X.lineWidth=isSel?2:1.5;X.setLineDash([5,3])}
    else{X.strokeStyle=isSel?'rgba(255,169,77,0.45)':'rgba(255,169,77,0.12)';X.lineWidth=isSel?1.5:0.7;X.setLineDash([2,2])}
    X.stroke();X.setLineDash([]);
    if(e.lb){const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;X.font='7px system-ui';X.fillStyle=isSel?'rgba(255,169,77,0.85)':'rgba(255,169,77,0.5)';X.textAlign='center';X.fillText(e.lb,mx,my-3);X.textAlign='start'}
  }
  // Nodes
  X.font='10px system-ui';
  for(const n of N){if(!vis(n))continue;
    const icon=ICONS[n.cat]||'';
    const lbl=icon?icon+' '+n.l:n.l;
    n.w=Math.max(65,X.measureText(lbl).width+16);
    const bx=n.x-n.w/2,by=n.y-n.h/2,p=0.5+0.5*Math.sin(t*2+n.x*0.01);
    const isSel=selected&&selected.id===n.id,isHov=hovered&&hovered.id===n.id;
    const isC=selected&&isConn(selected.id,n.id),bright=isSel||isHov||isC;
    X.shadowColor=n.c;X.shadowBlur=isSel?12:bright?8:3*p;
    const rad=n.o==='ifcx'?8:3; // IfcX = more rounded, IFC5 = more square
    rr(bx,by,n.w,n.h,rad);X.fillStyle=n.c+(isSel?'28':bright?'18':'10');X.fill();
    X.strokeStyle=n.c+(isSel?'ff':bright?'cc':'66');X.lineWidth=isSel?2.5:bright?1.5:1;X.stroke();
    // IfcX nodes get a subtle inner glow line
    if(n.o==='ifcx'){rr(bx+2,by+2,n.w-4,n.h-4,rad-1);X.strokeStyle=n.c+'15';X.lineWidth=0.5;X.stroke()}
    X.shadowBlur=0;
    X.fillStyle=bright?'#fff':'#bbb';X.textAlign='center';X.textBaseline='middle';X.fillText(lbl,n.x,n.y-1);
    // Origin label + indicator
    X.font='bold 7px system-ui';
    if(n.o==='ifcx'){
      X.fillStyle=bright?'rgba(105,219,124,0.9)':'rgba(105,219,124,0.5)';
      X.fillText('IfcX +',n.x,n.y+10);
    } else {
      X.fillStyle=bright?'rgba(77,166,255,0.7)':'rgba(77,166,255,0.35)';
      X.fillText('IFC5',n.x,n.y+10);
    }
    if(NODE_PSETS[n.id]){X.fillStyle=n.c+'77';X.fillRect(n.x+n.w/2-10,n.y-n.h/2+2,8,3);X.fillRect(n.x+n.w/2-10,n.y-n.h/2+6,6,3)}
    X.font='10px system-ui';
  }
  X.restore();requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
