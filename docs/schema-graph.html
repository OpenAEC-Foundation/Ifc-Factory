<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IfcX v2 Schema - Interactive Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0c14; color: #ccc; font-family: system-ui, sans-serif; overflow: hidden; }
canvas { display: block; cursor: grab; }
canvas.dragging { cursor: grabbing; }
#info {
  position: fixed; top: 10px; left: 10px; background: rgba(15,17,25,0.92);
  border: 1px solid #2a2d3a; border-radius: 8px; padding: 14px; max-width: 280px;
  font-size: 12px; z-index: 10; pointer-events: none;
}
#info h2 { color: #4da6ff; font-size: 15px; margin-bottom: 6px; }
#info p { color: #888; font-size: 11px; line-height: 1.5; margin-bottom: 4px; }
#info .keys { color: #4da6ff; font-size: 10px; }
#legend {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 14px; z-index: 10; pointer-events: none;
}
.leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #777; }
.leg .dot { width: 10px; height: 10px; border-radius: 2px; }
#tooltip {
  position: fixed; display: none; background: rgba(10,12,20,0.95);
  border: 1px solid #4da6ff; border-radius: 6px; padding: 10px 14px;
  font-size: 11px; z-index: 20; pointer-events: none; max-width: 320px;
}
#tooltip h3 { color: #4da6ff; font-size: 13px; margin-bottom: 4px; }
#tooltip .attr { color: #7ec; font-family: monospace; font-size: 10px; line-height: 1.6; }
#controls {
  position: fixed; top: 10px; right: 10px; z-index: 10;
  display: flex; flex-direction: column; gap: 5px;
}
#controls button {
  background: #1a1d28; border: 1px solid #2a2d3a; color: #aaa;
  padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
}
#controls button:hover { background: #2a2d3a; color: #fff; }
#controls button.active { background: #1a3a5c; border-color: #4da6ff; color: #4da6ff; }
</style>
</head>
<body>
<div id="info">
  <h2>IfcX v2 Schema Graph</h2>
  <p>Sleep nodes om te verplaatsen. Scroll = zoom. Rechtermuisknop = pan.</p>
  <p class="keys">Blauw = children | Groen = inherits | Oranje = connects</p>
</div>
<div id="controls">
  <button class="active" id="btn-all">Alles</button>
  <button id="btn-drawing">Tekeningen</button>
  <button id="btn-model">Model</button>
  <button id="btn-sheet">Sheets</button>
  <button id="btn-style">Stijlen</button>
</div>
<div id="legend">
  <div class="leg"><div class="dot" style="background:#4da6ff"></div>Spatial</div>
  <div class="leg"><div class="dot" style="background:#51cf66"></div>Geometry</div>
  <div class="leg"><div class="dot" style="background:#da77f2"></div>Annotation</div>
  <div class="leg"><div class="dot" style="background:#ffa94d"></div>Hatch</div>
  <div class="leg"><div class="dot" style="background:#ffd43b"></div>Style/Layer</div>
  <div class="leg"><div class="dot" style="background:#74c0fc"></div>Component</div>
  <div class="leg"><div class="dot" style="background:#ff6b6b"></div>Sheet</div>
  <div class="leg"><div class="dot" style="background:#20c997"></div>View</div>
</div>
<div id="tooltip"></div>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
const TT = document.getElementById('tooltip');
let W, H;
function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
resize(); addEventListener('resize', resize);

// === DATA ===
const N = [
  {id:'project', l:'IfcProject', c:'#4da6ff', p:'model', x:500, y:50, a:['bsi::ifc::class: IfcProject']},
  {id:'drawings', l:'Drawings/', c:'#20c997', p:'drawing', x:200, y:150, a:['Tekeningen container']},
  {id:'model', l:'Model/', c:'#4da6ff', p:'model', x:500, y:150, a:['BIM objecten']},
  {id:'sheets', l:'Sheets/', c:'#ff6b6b', p:'sheet', x:800, y:150, a:['Bladindelingen']},
  {id:'v1', l:'Plattegrond BG', c:'#20c997', p:'drawing', x:100, y:270, a:['ifcx::view::scale: 50','ifcx::view::projection: plan']},
  {id:'v2', l:'Plattegrond 1V', c:'#20c997', p:'drawing', x:250, y:270, a:['ifcx::view::scale: 50']},
  {id:'v3', l:'Doorsnede A-A', c:'#20c997', p:'drawing', x:400, y:270, a:['ifcx::view::scale: 50','ifcx::view::projection: section']},
  {id:'e1', l:'wall_north', c:'#51cf66', p:'drawing', x:50, y:400, a:['ifcx::geom::line','[[0,0],[5000,0]]']},
  {id:'e2', l:'wall_east', c:'#51cf66', p:'drawing', x:170, y:400, a:['ifcx::geom::line','[[5000,0],[5000,4000]]']},
  {id:'e3', l:'door_symbol', c:'#51cf66', p:'drawing', x:290, y:400, a:['ifcx::geom::trimmedCurve','radius: 900']},
  {id:'e4', l:'hatch_floor', c:'#ffa94d', p:'drawing', x:410, y:400, a:['ifcx::hatch::nen47','material: beton']},
  {id:'d1', l:'dim_width', c:'#da77f2', p:'annotation', x:100, y:520, a:['ifcx::annotation::dimension','linear, 5000mm']},
  {id:'t1', l:'room_label', c:'#da77f2', p:'annotation', x:260, y:520, a:['ifcx::annotation::text','"Woonkamer 45m\u00b2"']},
  {id:'site', l:'IfcSite', c:'#4da6ff', p:'model', x:500, y:270, a:['bsi::ifc::class: IfcSite']},
  {id:'bldg', l:'IfcBuilding', c:'#4da6ff', p:'model', x:500, y:370, a:['bsi::ifc::class: IfcBuilding']},
  {id:'stor', l:'Storey BG', c:'#4da6ff', p:'model', x:500, y:460, a:['bsi::ifc::class: IfcBuildingStorey']},
  {id:'wm', l:'IfcWall_001', c:'#4da6ff', p:'model', x:460, y:555, a:['bsi::ifc::class: IfcWall','Height: 2800, Beton C30']},
  {id:'dm', l:'IfcDoor_001', c:'#4da6ff', p:'model', x:580, y:555, a:['bsi::ifc::class: IfcDoor','Width: 900']},
  {id:'sc', l:'Style: Cut', c:'#ffd43b', p:'style', x:50, y:630, a:['ifcx::style::curveStyle','black, 0.35mm']},
  {id:'sd', l:'Style: Dim', c:'#ffd43b', p:'style', x:200, y:630, a:['ifcx::style::curveStyle','green, 0.18mm']},
  {id:'lw', l:'Layer: Walls', c:'#ffd43b', p:'style', x:350, y:630, a:['ifcx::layer::style','visible, plot']},
  {id:'sh1', l:'A1-001', c:'#ff6b6b', p:'sheet', x:750, y:270, a:['ifcx::sheet::paper','841x594mm']},
  {id:'vp1', l:'Viewport 1', c:'#ff6b6b', p:'sheet', x:700, y:390, a:['ifcx::sheet::viewport','view: Plattegrond BG']},
  {id:'vp2', l:'Viewport 2', c:'#ff6b6b', p:'sheet', x:850, y:390, a:['ifcx::sheet::viewport','view: Doorsnede A-A']},
  {id:'def', l:'DoorType 90cm', c:'#74c0fc', p:'definition', x:800, y:520, a:['ifcx::component::definition']},
  {id:'tb', l:'TitleBlock A1', c:'#74c0fc', p:'definition', x:950, y:390, a:['ifcx::component::definition']},
];

const E = [
  {f:'project',g:'drawings',t:'c'},{f:'project',g:'model',t:'c'},{f:'project',g:'sheets',t:'c'},
  {f:'drawings',g:'v1',t:'c'},{f:'drawings',g:'v2',t:'c'},{f:'drawings',g:'v3',t:'c'},
  {f:'v1',g:'e1',t:'c'},{f:'v1',g:'e2',t:'c'},{f:'v1',g:'e3',t:'c'},{f:'v1',g:'e4',t:'c'},
  {f:'v1',g:'d1',t:'c'},{f:'v1',g:'t1',t:'c'},
  {f:'v2',g:'e1',t:'c'},{f:'v2',g:'e2',t:'c'},
  {f:'model',g:'site',t:'c'},{f:'site',g:'bldg',t:'c'},{f:'bldg',g:'stor',t:'c'},
  {f:'stor',g:'wm',t:'c'},{f:'stor',g:'dm',t:'c'},
  {f:'sheets',g:'sh1',t:'c'},{f:'sh1',g:'vp1',t:'c'},{f:'sh1',g:'vp2',t:'c'},
  {f:'e3',g:'def',t:'i'},{f:'sh1',g:'tb',t:'i'},
  {f:'e1',g:'sc',t:'o',lb:'style'},{f:'e2',g:'sc',t:'o',lb:'style'},
  {f:'e1',g:'lw',t:'o',lb:'layer'},{f:'e2',g:'lw',t:'o',lb:'layer'},
  {f:'d1',g:'sd',t:'o',lb:'style'},
  {f:'e1',g:'wm',t:'o',lb:'source'},{f:'e3',g:'dm',t:'o',lb:'source'},
  {f:'d1',g:'e1',t:'o',lb:'measures'},{f:'d1',g:'e2',t:'o',lb:'measures'},
  {f:'vp1',g:'v1',t:'o',lb:'view'},{f:'vp2',g:'v3',t:'o',lb:'view'},
];

// Build lookup
const NM = {};
N.forEach(n => { NM[n.id] = n; n.vx = 0; n.vy = 0; n.w = 80; n.h = 34; });

let filter = 'all';
let cam = {x: 0, y: 0, z: 1};
let dragging = null, panning = false, lastMx = 0, lastMy = 0;

function vis(n) {
  if (filter === 'all') return true;
  if (filter === 'style') return n.p === 'style' || n.p === 'definition';
  return n.p === filter || n.p === 'drawing' && filter === 'drawing' || n.p === 'annotation' && filter === 'drawing';
}

function s2w(sx, sy) {
  return [(sx - W/2) / cam.z + cam.x, (sy - H/2) / cam.z + cam.y];
}

// Controls
document.querySelectorAll('#controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.id.replace('btn-', '');
  });
});

C.addEventListener('mousedown', e => {
  const [mx, my] = s2w(e.clientX, e.clientY);
  if (e.button === 2 || e.button === 1) { panning = true; lastMx = e.clientX; lastMy = e.clientY; C.classList.add('dragging'); return; }
  for (let i = N.length - 1; i >= 0; i--) {
    const n = N[i];
    if (!vis(n)) continue;
    if (mx > n.x - n.w/2 - 4 && mx < n.x + n.w/2 + 4 && my > n.y - n.h/2 - 4 && my < n.y + n.h/2 + 4) {
      dragging = n;
      C.classList.add('dragging');
      TT.style.display = 'block';
      TT.innerHTML = '<h3>' + n.l + '</h3><div class="attr">' + n.a.join('<br>') + '</div>';
      TT.style.left = (e.clientX + 15) + 'px';
      TT.style.top = (e.clientY - 10) + 'px';
      return;
    }
  }
  panning = true; lastMx = e.clientX; lastMy = e.clientY; C.classList.add('dragging');
});

C.addEventListener('contextmenu', e => e.preventDefault());

C.addEventListener('mousemove', e => {
  if (panning) {
    cam.x -= (e.clientX - lastMx) / cam.z;
    cam.y -= (e.clientY - lastMy) / cam.z;
    lastMx = e.clientX; lastMy = e.clientY;
  } else if (dragging) {
    const [mx, my] = s2w(e.clientX, e.clientY);
    dragging.x = mx; dragging.y = my;
    TT.style.left = (e.clientX + 15) + 'px';
    TT.style.top = (e.clientY - 10) + 'px';
  }
});

C.addEventListener('mouseup', () => {
  dragging = null; panning = false; C.classList.remove('dragging');
});

C.addEventListener('mouseleave', () => {
  dragging = null; panning = false; C.classList.remove('dragging');
  TT.style.display = 'none';
});

C.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 0.9 : 1.1;
  cam.z = Math.max(0.3, Math.min(5, cam.z * f));
}, {passive: false});

// Fit to view
cam.x = 450; cam.y = 340; cam.z = 1.1;

function roundRect(x, y, w, h, r) {
  X.beginPath();
  X.moveTo(x + r, y);
  X.lineTo(x + w - r, y);
  X.arcTo(x + w, y, x + w, y + r, r);
  X.lineTo(x + w, y + h - r);
  X.arcTo(x + w, y + h, x + w - r, y + h, r);
  X.lineTo(x + r, y + h);
  X.arcTo(x, y + h, x, y + h - r, r);
  X.lineTo(x, y + r);
  X.arcTo(x, y, x + r, y, r);
  X.closePath();
}

let time = 0;
function draw() {
  time += 0.01;
  X.clearRect(0, 0, W, H);
  X.save();
  X.translate(W/2, H/2);
  X.scale(cam.z, cam.z);
  X.translate(-cam.x, -cam.y);

  // Edges
  for (const e of E) {
    const a = NM[e.f], b = NM[e.g];
    if (!a || !b || !vis(a) || !vis(b)) continue;

    X.beginPath();
    X.moveTo(a.x, a.y);

    // Curved edges for connects
    if (e.t === 'o') {
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      const dx = b.x - a.x, dy = b.y - a.y;
      const cx = mx - dy * 0.15, cy = my + dx * 0.15;
      X.quadraticCurveTo(cx, cy, b.x, b.y);
    } else {
      X.lineTo(b.x, b.y);
    }

    if (e.t === 'c') { X.strokeStyle = 'rgba(77,166,255,0.3)'; X.lineWidth = 1.5; X.setLineDash([]); }
    else if (e.t === 'i') { X.strokeStyle = 'rgba(81,207,102,0.5)'; X.lineWidth = 2; X.setLineDash([6, 4]); }
    else { X.strokeStyle = 'rgba(255,169,77,0.25)'; X.lineWidth = 1; X.setLineDash([3, 3]); }
    X.stroke();
    X.setLineDash([]);

    if (e.lb) {
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      X.font = '8px system-ui';
      X.fillStyle = 'rgba(255,169,77,0.6)';
      X.fillText(e.lb, mx + 4, my - 4);
    }
  }

  // Nodes
  X.font = '11px system-ui';
  for (const n of N) {
    if (!vis(n)) continue;
    n.w = Math.max(80, X.measureText(n.l).width + 24);

    const bx = n.x - n.w/2, by = n.y - n.h/2;

    // Animated glow
    const pulse = 0.6 + 0.4 * Math.sin(time * 2 + n.x * 0.01);
    X.shadowColor = n.c;
    X.shadowBlur = 6 * pulse;

    roundRect(bx, by, n.w, n.h, 6);
    X.fillStyle = n.c + '20';
    X.fill();
    X.strokeStyle = n.c + (dragging === n ? 'ff' : 'aa');
    X.lineWidth = dragging === n ? 2.5 : 1.5;
    X.stroke();

    X.shadowBlur = 0;

    // Label
    X.fillStyle = '#e8e8e8';
    X.textAlign = 'center';
    X.textBaseline = 'middle';
    X.fillText(n.l, n.x, n.y - 2);

    // Purpose
    X.font = '8px system-ui';
    X.fillStyle = n.c + '88';
    X.fillText(n.p, n.x, n.y + 11);
    X.font = '11px system-ui';
  }

  X.restore();
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
