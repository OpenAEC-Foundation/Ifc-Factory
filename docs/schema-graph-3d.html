<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IfcX Schema - 3D Interactive Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060810;color:#ccc;font-family:system-ui,sans-serif;overflow:hidden;display:flex}
#scene{flex:1;position:relative}
canvas{display:block}

/* Info overlay */
#info{position:fixed;top:12px;left:12px;background:rgba(10,12,20,0.92);border:1px solid #2a2d3a;border-radius:10px;padding:14px 16px;max-width:280px;font-size:11px;z-index:10;pointer-events:none;backdrop-filter:blur(8px)}
#info h2{color:#4da6ff;font-size:16px;margin-bottom:6px;font-weight:600}
#info p{color:#667;font-size:10px;line-height:1.6;margin-bottom:2px}

/* Controls */
#controls{position:fixed;top:12px;right:12px;z-index:10;display:flex;flex-direction:column;gap:3px;transition:right .3s}
#controls.shifted{right:435px}
#controls button{background:rgba(20,22,34,0.9);border:1px solid #2a2d3a;color:#999;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:10px;text-align:left;backdrop-filter:blur(4px);transition:all .15s}
#controls button:hover{background:#1a2040;color:#fff;border-color:#4a4d5a}
#controls button.on{background:rgba(26,58,92,0.9);border-color:#4da6ff;color:#4da6ff}
.sep{height:1px;background:#1a1d28;margin:2px 0}

/* Side panel */
#panel{width:0;min-width:0;background:rgba(10,14,24,0.98);border-left:1px solid #1e2130;overflow-y:auto;overflow-x:hidden;transition:width .3s,min-width .3s;z-index:30;flex-shrink:0;backdrop-filter:blur(12px)}
#panel.open{width:420px;min-width:420px}
#panel-inner{padding:18px;opacity:0;transition:opacity .2s}
#panel.open #panel-inner{opacity:1}
#panel-close{position:absolute;top:10px;right:10px;background:none;border:1px solid #333;color:#888;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
#panel-close:hover{background:#1a1d28;color:#fff;border-color:#4da6ff}
#panel-header{position:relative;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #1a1d28}
#panel-header h2{font-size:20px;margin-bottom:2px;font-weight:600}
#panel-header .sub{font-size:11px;color:#556;margin-top:3px}
.badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:9px;font-weight:700;margin-top:8px;letter-spacing:.5px}
.sec{margin-bottom:16px}
.sec h3{font-size:11px;color:#4da6ff;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.2px;display:flex;align-items:center;gap:6px;font-weight:600}
.sec h3::before{content:'';display:inline-block;width:3px;height:14px;border-radius:2px;background:#4da6ff}
.ptable{width:100%;border-collapse:collapse;font-size:11px}
.ptable th{text-align:left;color:#556;font-weight:500;padding:5px 6px;border-bottom:1px solid #1a1d28;font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.ptable td{padding:5px 6px;border-bottom:1px solid #10121a;vertical-align:top}
.ptable tr:hover td{background:#10121a}
.pname{color:#7ec;font-family:'Cascadia Code',monospace;font-size:11px}
.ptype{color:#b197fc;font-size:10px;font-family:monospace}
.pdesc{color:#667;font-size:10px}
.pval{color:#ffa94d;font-size:10px;font-family:monospace}
.rel-list{list-style:none;padding:0}
.rel-list li{padding:6px 8px;border-radius:5px;margin-bottom:3px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
.rel-list li:hover{background:#141828}
.rel-list li .dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.rel-list li .rtype{color:#556;font-size:9px;margin-left:auto}
#breadcrumb{display:flex;gap:4px;font-size:10px;margin-bottom:10px;flex-wrap:wrap}
#breadcrumb span{color:#4da6ff;cursor:pointer;padding:2px 8px;background:#0c1020;border-radius:4px;transition:background .15s}
#breadcrumb span:hover{background:#1a2a44}
#breadcrumb span.current{color:#fff;cursor:default;background:#1a3a5c}
#stats{position:fixed;bottom:12px;left:12px;font-size:10px;color:#445;z-index:10;pointer-events:none}
#legend{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:80vw}
.lg{display:flex;align-items:center;gap:4px;font-size:9px;color:#556}.lg .d{width:8px;height:8px;border-radius:3px}
#panel::-webkit-scrollbar{width:6px}
#panel::-webkit-scrollbar-track{background:#0a0e18}
#panel::-webkit-scrollbar-thumb{background:#1e2130;border-radius:3px}
</style>
</head>
<body>

<div class="lg"><div class="d" style="background:#74b4ff"></div>IFC5 Structural</div>

<div class="lg"><div class="d" style="background:#51cf66"></div>ifcx::geom</div>
<div class="lg"><div class="d" style="background:#da77f2"></div>ifcx::annotation</div>
<div class="lg"><div class="d" style="background:#ff6b6b"></div>ifcx::sheet</div>
<div class="lg"><div class="d" style="background:#ffd43b"></div>ifcx::style</div>
<div class="lg"><div class="d" style="background:#ff922b"></div>ifcx::branding</div>
<div class="lg"><div class="d" style="background:#22b8cf"></div>ifcx::geom types</div>
<div class="lg"><div class="d" style="background:#e64980"></div>IFCXB/IFCXZ</div>
</div>
</div>

<!-- Side Panel -->
<div id="panel">
<div id="panel-inner">
<div id="panel-header">
<button id="panel-close">&times;</button>
<div id="breadcrumb"></div>
<h2 id="panel-title"></h2>
<div class="sub" id="panel-sub"></div>
<div id="panel-badge"></div>
</div>
<div id="panel-body"></div>
</div>
</div>

let filter='all';
const FGROUPS={
  'all':()=>true,'ifc5':n=>n.g==='ifc5','elem':n=>n.g==='elem',
  'mep':n=>n.g==='mep','struct':n=>n.g==='struct','infra':n=>n.g==='infra',
  'mat':n=>n.g==='mat','usd':n=>n.g==='usd','draw':n=>n.g==='draw',
  'sheet':n=>n.g==='sheet','style':n=>n.g==='style','brand':n=>n.g==='brand',
  'geom':n=>n.g==='geom','pkg':n=>n.g==='pkg','version':n=>n.g==='version'
};
function vis(n){return(FGROUPS[filter]||FGROUPS.all)(n)}

const nodeMeshes=[];const nodeMap={};

// Sphere geometry shared
const sphereGeo=new THREE.SphereGeometry(0.28,16,12);

nodes.forEach(n=>{
  const col=new THREE.Color(n.c);
  const mat=new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.3,transparent:true,opacity:0.9});
  const mesh=new THREE.Mesh(sphereGeo,mat);
  mesh.position.set(n.p[0]*S,n.p[1]*S,n.p[2]*S);
  mesh.userData={nodeId:n.id};
  scene.add(mesh);

  // Glow ring
  const ringGeo=new THREE.RingGeometry(0.35,0.42,24);
  const ringMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.15,side:THREE.DoubleSide});
  const ring=new THREE.Mesh(ringGeo,ringMat);
  ring.position.copy(mesh.position);
  scene.add(ring);

  // Label
  const div=document.createElement('div');
  div.style.cssText='color:#ccc;font-size:10px;background:rgba(6,8,16,0.75);padding:1px 6px;border-radius:3px;border:1px solid '+n.c+'44;white-space:nowrap;pointer-events:none;user-select:none';
  div.textContent=n.l;
  const label=new CSS2DObject(div);
  label.position.set(0,0.45,0);
  mesh.add(label);

  // Pset indicator
  if(NODE_PSETS[n.id]){
    const indGeo=new THREE.SphereGeometry(0.08,8,6);
    const indMat=new THREE.MeshBasicMaterial({color:0xffa94d});
    const ind=new THREE.Mesh(indGeo,indMat);
    ind.position.set(0.3,0.3,0);
    mesh.add(ind);
  }

  n._mesh=mesh;n._ring=ring;n._label=label;n._mat=mat;n._div=div;
  nodeMeshes.push(mesh);
  nodeMap[n.id]=n;
});

// ===================================
// CREATE 3D EDGES
// ===================================
const edgeLines=[];
edges.forEach(e=>{
  const a=NM[e.f],b=NM[e.t];if(!a||!b)return;
  const col=e.k==='c'?0x4da6ff:e.k==='i'?0x51cf66:0xffa94d;
  const opacity=e.k==='c'?0.15:e.k==='i'?0.3:0.12;
  const pts=[
    new THREE.Vector3(a.p[0]*S,a.p[1]*S,a.p[2]*S),
    new THREE.Vector3(b.p[0]*S,b.p[1]*S,b.p[2]*S)
  ];
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity});
  if(e.k==='i')mat.dashSize=0.3,mat.gapSize=0.15;
  const line=new THREE.Line(geo,mat);
  scene.add(line);
  e._line=line;e._mat=mat;e._origOp=opacity;
  edgeLines.push(e);
});

// ===================================
// RAYCASTING & INTERACTION
// ===================================
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let selected=null,hovered=null;
const historyStack=[];

renderer.domElement.addEventListener('mousemove',e=>{
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
});

renderer.domElement.addEventListener('click',e=>{
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(nodeMeshes);
  if(hits.length>0){
    const nid=hits[0].object.userData.nodeId;
    const node=NM[nid];if(node)openPanel(node);
  }
});

renderer.domElement.addEventListener('dblclick',e=>{
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(nodeMeshes);
  if(hits.length>0){
    const pos=hits[0].object.position;
    controls.target.lerp(pos,0.5);
  }
});

// ===================================
// FILTERING
// ===================================
function applyFilter(){
  nodes.forEach(n=>{
    const v=vis(n);
    n._mesh.visible=v;n._ring.visible=v;
  });
  edges.forEach(e=>{
    const a=NM[e.f],b=NM[e.t];
    e._line.visible=a&&b&&vis(a)&&vis(b);
  });
  updateStats();
}

function updateStats(){
  const vn=nodes.filter(vis).length;
  const ve=edges.filter(e=>{const a=NM[e.f],b=NM[e.t];return a&&b&&vis(a)&&vis(b)}).length;
  ST.textContent=vn+' nodes | '+ve+' edges';
}

document.querySelectorAll('#controls button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#controls button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');filter=b.id.replace('b-','');applyFilter();
  });
});
updateStats();

// ===================================
// PANEL
// ===================================
function openPanel(node){
  selected=node;historyStack.push(node.id);
  PNL.classList.add('open');CTRLS.classList.add('shifted');
  setTimeout(onResize,310);
  renderPanel(node);
  highlightNode(node);
}
function closePanel(){
  selected=null;historyStack.length=0;
  PNL.classList.remove('open');CTRLS.classList.remove('shifted');
  setTimeout(onResize,310);
  clearHighlight();
}
PCLOSE.addEventListener('click',closePanel);

function highlightNode(node){
  nodes.forEach(n=>{
    const conn=isConn(node.id,n.id);
    const isSel=n.id===node.id;
    n._mat.emissiveIntensity=isSel?0.8:conn?0.5:0.15;
    n._mat.opacity=isSel?1:conn?0.9:0.4;
    n._div.style.opacity=isSel?'1':conn?'0.9':'0.4';
    n._ring.material.opacity=isSel?0.4:conn?0.2:0.05;
  });
  edges.forEach(e=>{
    const conn=e.f===node.id||e.t===node.id;
    e._mat.opacity=conn?0.6:0.05;
  });
}
function clearHighlight(){
  nodes.forEach(n=>{n._mat.emissiveIntensity=0.3;n._mat.opacity=0.9;n._div.style.opacity='1';n._ring.material.opacity=0.15});
  edges.forEach(e=>{e._mat.opacity=e._origOp});
}

function isConn(a,b){
  for(const e of edges)if((e.f===a&&e.t===b)||(e.t===a&&e.f===b))return true;
  return false;
}

function getConnected(id){
  const children=[],parents=[],inherits=[],inheritedBy=[],connects=[];
  for(const e of edges){
    if(e.f===id){const n=NM[e.t];if(!n)continue;if(e.k==='c')children.push({node:n,label:e.lb||''});else if(e.k==='i')inherits.push({node:n,label:e.lb||'type'});else connects.push({node:n,label:e.lb||''});}
    if(e.t===id){const n=NM[e.f];if(!n)continue;if(e.k==='c')parents.push({node:n,label:e.lb||''});else if(e.k==='i')inheritedBy.push({node:n,label:e.lb||'instance'});else connects.push({node:n,label:e.lb||''});}
  }
  return{children,parents,inherits,inheritedBy,connects};
}

function renderPanel(node){
  PTITLE.textContent=node.l;
  PSUB.textContent=node.cat||node.g;
  PBADGE.innerHTML=`<span class="badge" style="background:${node.c}22;color:${node.c};border:1px solid ${node.c}44">${node.g.toUpperCase()}</span>`;

  BREAD.innerHTML='';
  [...new Set(historyStack)].forEach((hid,i,arr)=>{
    const hn=NM[hid];if(!hn)return;
    const sp=document.createElement('span');sp.textContent=hn.l;
    if(i===arr.length-1)sp.classList.add('current');
    else sp.addEventListener('click',()=>navigateTo(hid));
    BREAD.appendChild(sp);
  });

  let html='';

  // Attributes
  if(node.a&&node.a.length){
    html+='<div class="sec"><h3>Attributen</h3><table class="ptable"><tbody>';
    for(const attr of node.a){
      const parts=attr.split(': ');
      if(parts.length>=2)html+=`<tr><td class="pname">${esc(parts[0])}</td><td class="pval">${esc(parts.slice(1).join(': '))}</td></tr>`;
      else html+=`<tr><td class="pname" colspan="2">${esc(attr)}</td></tr>`;
    }
    html+='</tbody></table></div>';
  }

  // Psets
  const psets=NODE_PSETS[node.id];
  if(psets){
    for(const pname of psets){
      const ps=PSETS[pname];if(!ps)continue;
      html+=`<div class="sec"><h3>${esc(pname)}</h3><p style="font-size:10px;color:#556;margin-bottom:8px">${esc(ps.d)}</p>`;
      html+='<table class="ptable"><thead><tr><th>Property</th><th>Type</th><th>Omschrijving</th></tr></thead><tbody>';
      for(const p of ps.p)html+=`<tr><td class="pname">${esc(p.n)}</td><td class="ptype">${esc(p.t)}</td><td class="pdesc">${esc(p.d)}</td></tr>`;
      html+='</tbody></table></div>';
    }
  }

  // Relations
  const conn=getConnected(node.id);
  if(conn.parents.length){
    html+=`<div class="sec"><h3>Parent (${conn.parents.length})</h3><ul class="rel-list">`;
    for(const r of conn.parents)html+=relItem(r.node,'#4da6ff','parent');
    html+='</ul></div>';
  }
  if(conn.children.length){
    html+=`<div class="sec"><h3>Children (${conn.children.length})</h3><ul class="rel-list">`;
    for(const r of conn.children)html+=relItem(r.node,r.node.c,'child');
    html+='</ul></div>';
  }
  if(conn.inherits.length){
    html+=`<div class="sec"><h3>Type (${conn.inherits.length})</h3><ul class="rel-list">`;
    for(const r of conn.inherits)html+=relItem(r.node,'#51cf66','type');
    html+='</ul></div>';
  }
  if(conn.inheritedBy.length){
    html+=`<div class="sec"><h3>Instances (${conn.inheritedBy.length})</h3><ul class="rel-list">`;
    for(const r of conn.inheritedBy)html+=relItem(r.node,r.node.c,'instance');
    html+='</ul></div>';
  }
  if(conn.connects.length){
    html+=`<div class="sec"><h3>Connects (${conn.connects.length})</h3><ul class="rel-list">`;
    for(const r of conn.connects)html+=relItem(r.node,'#ffa94d',r.label);
    html+='</ul></div>';
  }

  PBODY.innerHTML=html;
  PBODY.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>navigateTo(el.dataset.nav));
  });
}

function relItem(node,color,type){
  return `<li data-nav="${node.id}"><div class="dot" style="background:${color}"></div>${esc(node.l)}<span class="rtype">${type}</span></li>`;
}

function navigateTo(id){
  const node=NM[id];if(!node)return;
  selected=node;historyStack.push(id);
  renderPanel(node);highlightNode(node);
  // Fly camera towards node
  const target=new THREE.Vector3(node.p[0]*S,node.p[1]*S,node.p[2]*S);
  controls.target.lerp(target,0.3);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ===================================
// ANIMATION LOOP
// ===================================
let time=0;
function animate(){
  requestAnimationFrame(animate);
  time+=0.01;
  controls.update();

  // Gentle float for rings
  nodes.forEach(n=>{
    if(!n._mesh.visible)return;
    n._ring.rotation.x=Math.sin(time+n.p[0])*0.3;
    n._ring.rotation.y=time*0.5+n.p[1]*0.1;
  });

  // Hover detection
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(nodeMeshes.filter(m=>m.visible));
  renderer.domElement.style.cursor=hits.length?'pointer':'grab';
  if(hits.length&&!selected){
    const nid=hits[0].object.userData.nodeId;
    if(!hovered||hovered.id!==nid){
      if(hovered)hovered._mat.emissiveIntensity=0.3;
      hovered=NM[nid];
      if(hovered)hovered._mat.emissiveIntensity=0.7;
    }
  }else if(!selected&&hovered){
    hovered._mat.emissiveIntensity=0.3;hovered=null;
  }

  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}

function onResize(){
  const w=SCENE_DIV.clientWidth,h=SCENE_DIV.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);labelRenderer.setSize(w,h);
}
window.addEventListener('resize',onResize);
onResize();
animate();
</script>
</body>
</html>
