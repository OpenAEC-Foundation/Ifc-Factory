<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFCX 2D Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-dark: #0f0f1a;
    --bg-panel: #16162a;
    --bg-item: #1e1e38;
    --bg-hover: #2a2a4a;
    --border: #2d2d50;
    --text: #c8c8e0;
    --text-dim: #7878a0;
    --accent: #4fc3f7;
    --accent-dim: #2a7fa8;
    --red: #ef5350;
    --green: #66bb6a;
    --yellow: #ffca28;
  }

  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .toolbar .logo {
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    margin-right: 12px;
    letter-spacing: 1px;
    user-select: none;
  }

  .toolbar button {
    background: var(--bg-item);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .toolbar button:hover { background: var(--bg-hover); border-color: var(--accent-dim); }
  .toolbar button:active { background: var(--accent-dim); }

  .toolbar .sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
  }

  .toolbar .file-info {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Canvas area ── */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  /* ── Drop overlay ── */
  .drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 15, 26, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
  }
  .drop-overlay.active { display: flex; }

  .drop-overlay .drop-box {
    border: 2px dashed var(--accent);
    border-radius: 16px;
    padding: 60px 80px;
    text-align: center;
  }
  .drop-overlay .drop-box h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .drop-overlay .drop-box p {
    color: var(--text-dim);
    font-size: 13px;
  }

  /* ── Welcome screen ── */
  .welcome {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-dim);
    pointer-events: none;
  }
  .welcome h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .welcome p { font-size: 14px; }
  .welcome .hint { font-size: 12px; opacity: 0.5; }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    background: var(--bg-item);
    border-bottom: 1px solid var(--border);
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-header .badge {
    background: var(--accent-dim);
    color: #fff;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
  }

  /* ── Layer panel ── */
  .layer-panel {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .layer-panel::-webkit-scrollbar { width: 5px; }
  .layer-panel::-webkit-scrollbar-track { background: transparent; }
  .layer-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .layer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid rgba(45,45,80,0.3);
  }
  .layer-item:hover { background: var(--bg-hover); }

  .layer-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .layer-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .layer-toggle {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1.5px solid var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .layer-toggle.on {
    background: var(--accent);
    border-color: var(--accent);
  }
  .layer-toggle.on::after {
    content: '';
    display: block;
    width: 6px;
    height: 3px;
    border-left: 1.5px solid #fff;
    border-bottom: 1.5px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }

  .layer-item.hidden .layer-name { opacity: 0.35; text-decoration: line-through; }

  /* ── Info panel ── */
  .info-panel {
    max-height: 40%;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .info-panel::-webkit-scrollbar { width: 5px; }
  .info-panel::-webkit-scrollbar-track { background: transparent; }
  .info-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .info-row {
    display: flex;
    padding: 4px 14px;
    font-size: 11px;
    border-bottom: 1px solid rgba(45,45,80,0.2);
  }
  .info-key {
    width: 100px;
    flex-shrink: 0;
    color: var(--text-dim);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .info-val {
    flex: 1;
    color: var(--text);
    word-break: break-all;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 11px;
  }

  .info-empty {
    padding: 20px 14px;
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
  }

  /* ── Status bar ── */
  .statusbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 3px 12px;
    background: var(--bg-item);
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .statusbar .coord { font-family: 'Cascadia Code', 'Consolas', monospace; }

  /* ── Hidden file input ── */
  #file-input { display: none; }

  /* ── SVG icons inline ── */
  .icon {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <span class="logo">IFCX VIEWER</span>
  <button id="btn-open" title="Open file (Ctrl+O)">
    <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Open
  </button>
  <div class="sep"></div>
  <button id="btn-fit" title="Zoom to fit (F)">
    <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
    Fit
  </button>
  <button id="btn-zoomin" title="Zoom in (+)">
    <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    In
  </button>
  <button id="btn-zoomout" title="Zoom out (-)">
    <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    Out
  </button>
  <div class="sep"></div>
  <span class="file-info" id="file-info">No file loaded</span>
</div>

<!-- Main area -->
<div class="main">
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="canvas"></canvas>

    <!-- Drop overlay -->
    <div class="drop-overlay" id="drop-overlay">
      <div class="drop-box">
        <h2>Drop file here</h2>
        <p>.ifcx or .dxf files</p>
      </div>
    </div>

    <!-- Welcome screen -->
    <div class="welcome" id="welcome">
      <h1>IFCX 2D VIEWER</h1>
      <p>Open an .ifcx or .dxf file to get started</p>
      <p class="hint">Drag &amp; drop a file or click Open</p>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="panel-header">
      Layers
      <span class="badge" id="layer-count">0</span>
    </div>
    <div class="layer-panel" id="layer-panel"></div>

    <div class="panel-header">
      Entity Info
    </div>
    <div class="info-panel" id="info-panel">
      <div class="info-empty">Click an entity to inspect</div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="statusbar">
  <span>Cursor: <span class="coord" id="status-coord">0, 0</span></span>
  <span>Zoom: <span id="status-zoom">100%</span></span>
  <span id="status-entities">0 entities</span>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".ifcx,.dxf,.json">

<script type="module">
import { Renderer } from './renderer.js';
import { convertDxfToIfcx } from './converter.js';

// ─── Setup ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const canvasWrap = document.getElementById('canvas-wrap');
const renderer = new Renderer(canvas);

let isPanning = false;
let lastMouseX = 0, lastMouseY = 0;
let fileLoaded = false;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvasWrap.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  canvas.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  // Adjust internal dimensions for the renderer
  renderer.canvas = { width: rect.width, height: rect.height, getContext: () => canvas.getContext('2d') };
  if (fileLoaded) renderer.render();
}

// Use a fake canvas object for the renderer that uses CSS pixels
const rendererCanvas = {
  width: 0, height: 0,
  getContext(type) { return canvas.getContext(type); }
};

function updateRendererCanvas() {
  const rect = canvasWrap.getBoundingClientRect();
  rendererCanvas.width = rect.width;
  rendererCanvas.height = rect.height;
  renderer.canvas = rendererCanvas;
  renderer.ctx = canvas.getContext('2d');
}

function fullResize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvasWrap.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  updateRendererCanvas();
  if (fileLoaded) renderer.render();
}

window.addEventListener('resize', fullResize);
fullResize();

// ─── File loading ──────────────────────────────────────
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    const text = ev.target.result;
    let doc;
    try {
      if (file.name.toLowerCase().endsWith('.dxf')) {
        doc = convertDxfToIfcx(text);
      } else {
        doc = JSON.parse(text);
      }
    } catch (err) {
      alert('Failed to parse file: ' + err.message);
      return;
    }

    fileLoaded = true;
    document.getElementById('welcome').style.display = 'none';
    renderer.loadDocument(doc);
    renderer.render();
    updateUI(file.name, doc);
  };
  reader.readAsText(file);
}

function updateUI(filename, doc) {
  document.getElementById('file-info').textContent = filename;

  // Layer panel
  const layers = renderer.getLayers();
  const layerPanel = document.getElementById('layer-panel');
  layerPanel.innerHTML = '';
  const layerNames = Object.keys(layers);
  document.getElementById('layer-count').textContent = layerNames.length;

  for (const name of layerNames) {
    const info = layers[name];
    const item = document.createElement('div');
    item.className = 'layer-item' + (info.visible ? '' : ' hidden');

    const swatch = document.createElement('div');
    swatch.className = 'layer-swatch';
    swatch.style.background = info.color;

    const label = document.createElement('span');
    label.className = 'layer-name';
    label.textContent = name;

    const toggle = document.createElement('div');
    toggle.className = 'layer-toggle' + (info.visible ? ' on' : '');

    toggle.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const vis = !renderer.layerVisibility[name];
      renderer.setLayerVisibility(name, vis);
      toggle.classList.toggle('on', vis);
      item.classList.toggle('hidden', !vis);
      renderer.render();
    });

    item.appendChild(swatch);
    item.appendChild(label);
    item.appendChild(toggle);
    layerPanel.appendChild(item);
  }

  // Stats
  const total = doc.entities ? doc.entities.length : 0;
  document.getElementById('status-entities').textContent = `${total} entities`;
  updateZoomStatus();
}

function showEntityInfo(entity) {
  const panel = document.getElementById('info-panel');
  if (!entity) {
    panel.innerHTML = '<div class="info-empty">Click an entity to inspect</div>';
    return;
  }
  const info = renderer.getEntityInfo(entity);
  panel.innerHTML = '';
  for (const [k, v] of Object.entries(info)) {
    const row = document.createElement('div');
    row.className = 'info-row';
    const key = document.createElement('span');
    key.className = 'info-key';
    key.textContent = k;
    const val = document.createElement('span');
    val.className = 'info-val';
    val.textContent = String(v);
    row.appendChild(key);
    row.appendChild(val);
    panel.appendChild(row);
  }
}

function updateZoomStatus() {
  document.getElementById('status-zoom').textContent = (renderer.zoom * 100).toFixed(0) + '%';
}

// ─── Mouse interaction ─────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0 || e.button === 1) {
    isPanning = true;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    canvas.style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', (e) => {
  if (!fileLoaded) return;

  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const [wx, wy] = renderer.screenToWorld(mx, my);
  document.getElementById('status-coord').textContent =
    `${wx.toFixed(2)}, ${wy.toFixed(2)}`;

  if (isPanning) {
    const dx = (e.clientX - lastMouseX) / renderer.zoom;
    const dy = -(e.clientY - lastMouseY) / renderer.zoom;
    renderer.panX -= dx;
    renderer.panY -= dy;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    renderer.render();
  }
});

window.addEventListener('mouseup', () => {
  if (isPanning) {
    isPanning = false;
    canvas.style.cursor = 'crosshair';
  }
});

canvas.addEventListener('click', (e) => {
  if (!fileLoaded) return;
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const hit = renderer.hitTest(mx, my);
  renderer.selectedEntity = hit;
  renderer.render();
  showEntityInfo(hit);
});

canvas.addEventListener('wheel', (e) => {
  if (!fileLoaded) return;
  e.preventDefault();
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // World coords under mouse before zoom
  const [wx, wy] = renderer.screenToWorld(mx, my);

  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  renderer.zoom *= factor;
  renderer.zoom = Math.max(0.0001, Math.min(renderer.zoom, 100000));

  // Adjust pan so world point under mouse stays fixed
  renderer.panX = wx - mx / renderer.zoom;
  renderer.panY = wy - (rendererCanvas.height - my) / renderer.zoom;

  renderer.render();
  updateZoomStatus();
}, { passive: false });

// ─── Toolbar buttons ───────────────────────────────────
document.getElementById('btn-open').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', (e) => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value = '';
});

document.getElementById('btn-fit').addEventListener('click', () => {
  if (fileLoaded) {
    renderer.zoomExtents();
    renderer.render();
    updateZoomStatus();
  }
});

document.getElementById('btn-zoomin').addEventListener('click', () => {
  if (!fileLoaded) return;
  const cx = rendererCanvas.width / 2;
  const cy = rendererCanvas.height / 2;
  const [wx, wy] = renderer.screenToWorld(cx, cy);
  renderer.zoom *= 1.3;
  renderer.panX = wx - cx / renderer.zoom;
  renderer.panY = wy - cy / renderer.zoom;
  renderer.render();
  updateZoomStatus();
});

document.getElementById('btn-zoomout').addEventListener('click', () => {
  if (!fileLoaded) return;
  const cx = rendererCanvas.width / 2;
  const cy = rendererCanvas.height / 2;
  const [wx, wy] = renderer.screenToWorld(cx, cy);
  renderer.zoom /= 1.3;
  renderer.panX = wx - cx / renderer.zoom;
  renderer.panY = wy - cy / renderer.zoom;
  renderer.render();
  updateZoomStatus();
});

// ─── Keyboard shortcuts ────────────────────────────────
window.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'o') {
    e.preventDefault();
    document.getElementById('file-input').click();
  }
  if (!fileLoaded) return;
  if (e.key === 'f' || e.key === 'F') {
    renderer.zoomExtents();
    renderer.render();
    updateZoomStatus();
  }
  if (e.key === '+' || e.key === '=') {
    document.getElementById('btn-zoomin').click();
  }
  if (e.key === '-') {
    document.getElementById('btn-zoomout').click();
  }
  if (e.key === 'Escape') {
    renderer.selectedEntity = null;
    renderer.render();
    showEntityInfo(null);
  }
});

// ─── Drag and drop ─────────────────────────────────────
const dropOverlay = document.getElementById('drop-overlay');
let dragCounter = 0;

window.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dropOverlay.classList.add('active');
});

window.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove('active');
  }
});

window.addEventListener('dragover', (e) => {
  e.preventDefault();
});

window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');
  if (e.dataTransfer.files.length > 0) {
    loadFile(e.dataTransfer.files[0]);
  }
});

</script>
</body>
</html>
